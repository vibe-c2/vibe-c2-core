upstream backend {
    server core-dev:8002;
}

upstream hocuspocus {
    server hocuspocus:1234;
}

upstream frontend {
    server frontend-dev:5173;
}

server {
    listen 80;

    # Hocuspocus WebSocket — MUST come before /api/ to match first
    location /api/v1/ws/wiki/ {
        proxy_pass http://hocuspocus;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # Go backend REST + GraphQL (including SSE subscriptions on POST /graphql
    # with Accept: text/event-stream — disable proxy buffering so frames flush
    # to the client immediately instead of being held until the stream closes).
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
        # Match the largest backend upload cap (WIKI_IMPORT_ZIP_MAX_SIZE=200 MB,
        # used by the Outline-export importer). Per-endpoint caps (10 MB images,
        # 50 MB files, 200 MB import zip) stay enforced by the Go handlers; this
        # just stops nginx's 1 MB default from returning 413 before the request
        # reaches them.
        client_max_body_size 200M;
    }

    # Swagger UI
    location /swagger/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # Frontend (Vite dev server + HMR WebSocket)
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
