upstream backend {
    server core-dev:8002;
}

upstream hocuspocus {
    server hocuspocus:1234;
}

upstream frontend {
    server frontend-dev:5173;
}

# Plain HTTP listener — keeps health checks and any old http:// links working
# by redirecting to HTTPS. The browser-facing surface is HTTPS / HTTP/2 below.
server {
    listen 80 default_server;
    server_name _;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location / {
        return 301 https://$host:8443$request_uri;
    }
}

# HTTPS + HTTP/2 — the real entrypoint for browsers. HTTP/2 multiplexes all
# requests (including SSE subscription streams and graphql-ws upgrades) over
# a single TCP connection per origin, so the old 6-connection HTTP/1.1 cap
# stops dictating subscription topology.
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/localhost.crt;
    ssl_certificate_key /etc/nginx/certs/localhost.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Hocuspocus WebSocket — MUST come before /api/ to match first. Browser
    # uses wss:// because the page is HTTPS; nginx terminates TLS and proxies
    # to the upstream as plain ws:// on the docker network.
    location /api/v1/ws/wiki/ {
        proxy_pass http://hocuspocus;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # graphql-ws WebSocket transport — single multiplexed channel for all
    # GraphQL subscriptions. Same upgrade dance as Hocuspocus; the client
    # ships subscription operations over the connection as graphql-ws frames.
    location = /api/v1/graphql/ws {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # Go backend REST + GraphQL (including legacy SSE subscriptions on
    # POST /graphql with Accept: text/event-stream — disable proxy buffering
    # so frames flush immediately).
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
        # Match the largest backend upload cap (WIKI_IMPORT_ZIP_MAX_SIZE=200 MB,
        # used by the Outline-export importer). Per-endpoint caps (10 MB images,
        # 50 MB files, 200 MB import zip) stay enforced by the Go handlers; this
        # just stops nginx's 1 MB default from returning 413 before the request
        # reaches them.
        client_max_body_size 200M;
    }

    # Swagger UI
    location /swagger/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend (Vite dev server + HMR WebSocket)
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
