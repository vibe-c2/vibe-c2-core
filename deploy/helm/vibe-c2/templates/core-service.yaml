{{- if .Values.core.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vibe-c2.core.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vibe-c2.labels" . | nindent 4 }}
    app.kubernetes.io/component: core
spec:
  type: {{ .Values.core.service.type }}
  ports:
    - name: http
      port: {{ .Values.core.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "vibe-c2.core.selectorLabels" . | nindent 4 }}
{{- end -}}
