{{- if .Values.bucketBootstrap.enabled -}}
{{- $secretName := include "vibe-c2.appSecretName" . -}}
{{/*
SeaweedFS bucket bootstrap.

The first wiki upload creates objects under buckets the chart expects to
exist (wiki-images, wiki-files). The SeaweedFS chart does NOT pre-create
buckets. This Job runs `mc mb --ignore-existing` against the filer's S3
endpoint so the buckets are guaranteed to be present before traffic flows.

This is a regular Job, NOT a helm hook. Running it as a hook makes
`helm install` block while SeaweedFS warms up (3–5 minutes on a cold
laptop), which is a poor UX for both smoke tests and production rollouts.
As a regular resource the Job retries on its own — `mc mb` against a
not-yet-ready S3 endpoint is just transient failure, and the Job's
`backoffLimit: 6` plus the startup wait loop below cover the entire
SeaweedFS warmup window without blocking helm.

Helm re-creates the Job on every upgrade (Jobs are immutable, so the
upgrade does delete-then-create automatically). `ttlSecondsAfterFinished`
also auto-cleans successful Jobs after 5 minutes.
*/}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "vibe-c2.fullname" . }}-bucket-bootstrap
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vibe-c2.labels" . | nindent 4 }}
    app.kubernetes.io/component: bucket-bootstrap
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "vibe-c2.labels" . | nindent 8 }}
        app.kubernetes.io/component: bucket-bootstrap
    spec:
      restartPolicy: OnFailure
      {{- include "vibe-c2.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: mc
          image: "{{ .Values.bucketBootstrap.image.repository }}:{{ .Values.bucketBootstrap.image.tag }}"
          imagePullPolicy: {{ .Values.bucketBootstrap.image.pullPolicy }}
          env:
            - name: S3_ENDPOINT
              value: {{ include "vibe-c2.seaweedfs.s3Endpoint" . | quote }}
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: seaweedfsS3AccessKey
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: seaweedfsS3SecretKey
            - name: WIKI_IMAGE_BUCKET
              value: {{ .Values.core.config.wikiImage.bucket | quote }}
            - name: WIKI_FILE_BUCKET
              value: {{ .Values.core.config.wikiFile.bucket | quote }}
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              # Wait for SeaweedFS S3 to answer before issuing mc commands.
              # The filer is part of the same release and may still be
              # initializing when this Job is scheduled.
              for i in $(seq 1 60); do
                if wget -q --spider "$S3_ENDPOINT" 2>/dev/null \
                   || nc -z "$(echo "$S3_ENDPOINT" | sed -E 's|http://([^:/]+):?([0-9]*)/?.*|\1|')" \
                          "$(echo "$S3_ENDPOINT" | sed -E 's|http://[^:/]+:([0-9]+)/?.*|\1|')" 2>/dev/null; then
                  break
                fi
                echo "Waiting for SeaweedFS S3 at $S3_ENDPOINT ($i/60)..."
                sleep 2
              done

              mc alias set seaweed "$S3_ENDPOINT" "$S3_ACCESS_KEY" "$S3_SECRET_KEY"
              mc mb --ignore-existing "seaweed/${WIKI_IMAGE_BUCKET}"
              mc mb --ignore-existing "seaweed/${WIKI_FILE_BUCKET}"
              echo "Buckets ensured: ${WIKI_IMAGE_BUCKET}, ${WIKI_FILE_BUCKET}"
          resources:
            {{- toYaml .Values.bucketBootstrap.resources | nindent 12 }}
{{- end -}}
