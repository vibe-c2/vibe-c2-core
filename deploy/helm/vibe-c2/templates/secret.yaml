{{/*
Application Secret. Skipped entirely when the operator points the chart
at an existing Secret via secrets.existingSecret.

The keys here are the contract the rest of the chart depends on. If you
provide your own Secret it MUST contain every key listed below. The
bitnami subcharts also read from this same Secret (mongoUsername /
mongoPassword / redis-password) when the wrapper wires them in via
templates/_helpers.tpl.
*/}}
{{- if not .Values.secrets.existingSecret -}}
{{- $v := .Values.secrets.values -}}
{{- if not $v.jwtSecretKey }}{{ fail "secrets.values.jwtSecretKey is required (or set secrets.existingSecret)" }}{{ end -}}
{{- if not $v.mongoPassword }}{{ fail "secrets.values.mongoPassword is required (or set secrets.existingSecret)" }}{{ end -}}
{{- if not $v.seaweedfsS3SecretKey }}{{ fail "secrets.values.seaweedfsS3SecretKey is required (or set secrets.existingSecret)" }}{{ end -}}
{{- if not $v.hocuspocusTicketSecret }}{{ fail "secrets.values.hocuspocusTicketSecret is required (or set secrets.existingSecret)" }}{{ end -}}
{{- if not $v.hocuspocusWebhookSecret }}{{ fail "secrets.values.hocuspocusWebhookSecret is required (or set secrets.existingSecret)" }}{{ end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vibe-c2.appSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vibe-c2.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Application secrets consumed by core
  jwtSecretKey: {{ $v.jwtSecretKey | quote }}
  mongoUsername: {{ $v.mongoUsername | quote }}
  mongoPassword: {{ $v.mongoPassword | quote }}

  # Bitnami mongodb chart key conventions — replicated here so the
  # subchart can `auth.existingSecret` directly on this same object.
  mongodb-root-password: {{ $v.mongoPassword | quote }}
  mongodb-passwords: {{ $v.mongoPassword | quote }}

  # Redis — bitnami reads `redis-password` by default.
  redisPassword: {{ $v.redisPassword | default "" | quote }}
  redis-password: {{ $v.redisPassword | default "" | quote }}

  # SeaweedFS S3 credentials shared by core (writes) and the bucket
  # bootstrap Job (creates wiki-images / wiki-files on first install).
  seaweedfsS3AccessKey: {{ $v.seaweedfsS3AccessKey | quote }}
  seaweedfsS3SecretKey: {{ $v.seaweedfsS3SecretKey | quote }}

  # Hocuspocus shared HMAC keys
  hocuspocusTicketSecret: {{ $v.hocuspocusTicketSecret | quote }}
  hocuspocusWebhookSecret: {{ $v.hocuspocusWebhookSecret | quote }}
{{- end -}}
