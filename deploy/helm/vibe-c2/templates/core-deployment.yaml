{{- if .Values.core.enabled -}}
{{- $secretName := include "vibe-c2.appSecretName" . -}}
{{- $configName := include "vibe-c2.configName" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vibe-c2.core.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vibe-c2.labels" . | nindent 4 }}
    app.kubernetes.io/component: core
spec:
  replicas: {{ .Values.core.replicaCount }}
  selector:
    matchLabels:
      {{- include "vibe-c2.core.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "vibe-c2.labels" . | nindent 8 }}
        app.kubernetes.io/component: core
      annotations:
        # Roll pods when ConfigMap or Secret content changes so env-var
        # updates take effect on the next `helm upgrade`.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if not .Values.secrets.existingSecret }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.core.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- include "vibe-c2.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- toYaml .Values.core.podSecurityContext | nindent 8 }}
      containers:
        - name: core
          image: {{ include "vibe-c2.image" (dict "image" .Values.core.image "root" $) | quote }}
          imagePullPolicy: {{ .Values.core.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.core.containerPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ $configName }}
          env:
            # Mongo URI is composed at runtime from username + password
            # (in Secret) plus host (in ConfigMap). Keeps password out
            # of the ConfigMap's plaintext.
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: mongoUsername
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: mongoPassword
            - name: MONGO_URI
              value: "mongodb://$(MONGO_INITDB_ROOT_USERNAME):$(MONGO_INITDB_ROOT_PASSWORD)@$(MONGO_HOST):$(MONGO_PORT)"

            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: redis-password

            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: jwtSecretKey

            - name: SEAWEEDFS_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: seaweedfsS3AccessKey
            - name: SEAWEEDFS_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: seaweedfsS3SecretKey

            - name: HOCUSPOCUS_TICKET_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: hocuspocusTicketSecret
            - name: HOCUSPOCUS_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: hocuspocusWebhookSecret
          livenessProbe:
            {{- toYaml .Values.core.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.core.readinessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.core.startupProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.core.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.core.securityContext | nindent 12 }}
          # Writable scratch directory required by code paths that need
          # io.ReaderAt over multipart uploads — e.g. the Outline-import
          # controller spools zips to /tmp via os.CreateTemp before opening
          # them with archive/zip. The container's root filesystem is
          # read-only, so /tmp must be a separate writable volume.
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: {{ .Values.core.tmpSizeLimit | default "512Mi" | quote }}
      {{- with .Values.core.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.core.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.core.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end -}}
