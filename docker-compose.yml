services:
  core-dev:
    build:
      context: ./core
      dockerfile: dev.Dockerfile
    container_name: vibec2-core-dev
    restart: unless-stopped
    profiles:
      - development
    volumes:
      - ./core:/app
    environment:
      APP_STAGE_STATUS: ${APP_STAGE_STATUS}
      APP_DEBUG: ${APP_DEBUG}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017
      MONGO_DATABASE: ${MONGO_DATABASE}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CACHE_ENABLED: ${CACHE_ENABLED}
      HOCUSPOCUS_URL: http://hocuspocus:1234
      HOCUSPOCUS_TICKET_SECRET: ${HOCUSPOCUS_TICKET_SECRET}
      HOCUSPOCUS_WEBHOOK_SECRET: ${HOCUSPOCUS_WEBHOOK_SECRET}
      WIKI_AUTO_BACKUP_INTERVAL: ${WIKI_AUTO_BACKUP_INTERVAL:-30m}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vibec2

  frontend-dev:
    build:
      context: ./frontend
      dockerfile: dev.Dockerfile
    container_name: vibec2-frontend-dev
    restart: unless-stopped
    profiles:
      - development
    volumes:
      - ./frontend:/app
    networks:
      - vibec2

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: vibec2-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vibec2

  mongodb:
    image: mongo:7
    container_name: vibec2-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: mongosh --eval "db.adminCommand('ping')" --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vibec2

  redis:
    image: redis:7-alpine
    container_name: vibec2-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vibec2

  seaweedfs-master:
    image: chrislusf/seaweedfs:latest
    container_name: vibec2-seaweedfs-master
    restart: unless-stopped
    command: master -ip=seaweedfs-master -ip.bind=0.0.0.0
    volumes:
      - seaweedfs_master_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9333/cluster/status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vibec2

  seaweedfs-volume:
    image: chrislusf/seaweedfs:latest
    container_name: vibec2-seaweedfs-volume
    restart: unless-stopped
    command: volume -mserver=seaweedfs-master:9333 -ip.bind=0.0.0.0 -port=8080
    volumes:
      - seaweedfs_volume_data:/data
    depends_on:
      seaweedfs-master:
        condition: service_healthy
    networks:
      - vibec2

  seaweedfs-filer:
    image: chrislusf/seaweedfs:latest
    container_name: vibec2-seaweedfs-filer
    restart: unless-stopped
    command: filer -master=seaweedfs-master:9333 -ip.bind=0.0.0.0
    depends_on:
      seaweedfs-master:
        condition: service_healthy
    networks:
      - vibec2

  seaweedfs-s3:
    image: chrislusf/seaweedfs:latest
    container_name: vibec2-seaweedfs-s3
    restart: unless-stopped
    command: s3 -filer=seaweedfs-filer:8888 -ip.bind=0.0.0.0
    environment:
      AWS_ACCESS_KEY_ID: ${SEAWEEDFS_S3_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${SEAWEEDFS_S3_SECRET_KEY}
    depends_on:
      - seaweedfs-filer
    networks:
      - vibec2

  hocuspocus:
    build:
      context: ./hocuspocus
      dockerfile: dev.Dockerfile
    container_name: vibec2-hocuspocus
    restart: unless-stopped
    profiles:
      - development
    environment:
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017
      MONGO_DATABASE: ${MONGO_DATABASE}
      HOCUSPOCUS_TICKET_SECRET: ${HOCUSPOCUS_TICKET_SECRET}
      HOCUSPOCUS_WEBHOOK_SECRET: ${HOCUSPOCUS_WEBHOOK_SECRET}
      HOCUSPOCUS_WEBHOOK_URL: http://core-dev:8002/api/v1/internal/wiki/webhook
      HOCUSPOCUS_DEBOUNCE_MS: ${HOCUSPOCUS_DEBOUNCE_MS:-2000}
      PORT: 1234
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - vibec2

  nginx:
    image: nginx:alpine
    container_name: vibec2-nginx
    restart: unless-stopped
    profiles:
      - development
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - core-dev
      - frontend-dev
      - hocuspocus
    networks:
      - vibec2

volumes:
  rabbitmq_data:
  mongodb_data:
  seaweedfs_master_data:
  redis_data:
  seaweedfs_volume_data:

networks:
  vibec2:
    driver: bridge
