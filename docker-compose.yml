services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: vibec2-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vibec2

  mongodb:
    image: mongo:7
    container_name: vibec2-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: mongosh --eval "db.adminCommand('ping')" --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vibec2

  seaweedfs-master:
    image: chrislusf/seaweedfs:latest
    container_name: vibec2-seaweedfs-master
    restart: unless-stopped
    command: master -ip=seaweedfs-master -ip.bind=0.0.0.0
    ports:
      - "9333:9333"
    volumes:
      - seaweedfs_master_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9333/cluster/status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vibec2

  seaweedfs-volume:
    image: chrislusf/seaweedfs:latest
    container_name: vibec2-seaweedfs-volume
    restart: unless-stopped
    command: volume -mserver=seaweedfs-master:9333 -ip.bind=0.0.0.0 -port=8080
    ports:
      - "8080:8080"
    volumes:
      - seaweedfs_volume_data:/data
    depends_on:
      seaweedfs-master:
        condition: service_healthy
    networks:
      - vibec2

  seaweedfs-filer:
    image: chrislusf/seaweedfs:latest
    container_name: vibec2-seaweedfs-filer
    restart: unless-stopped
    command: filer -master=seaweedfs-master:9333 -ip.bind=0.0.0.0
    ports:
      - "8888:8888"
    depends_on:
      seaweedfs-master:
        condition: service_healthy
    networks:
      - vibec2

  seaweedfs-s3:
    image: chrislusf/seaweedfs:latest
    container_name: vibec2-seaweedfs-s3
    restart: unless-stopped
    command: s3 -filer=seaweedfs-filer:8888 -ip.bind=0.0.0.0
    environment:
      AWS_ACCESS_KEY_ID: ${SEAWEEDFS_S3_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${SEAWEEDFS_S3_SECRET_KEY}
    ports:
      - "8333:8333"
    depends_on:
      - seaweedfs-filer
    networks:
      - vibec2

volumes:
  rabbitmq_data:
  mongodb_data:
  seaweedfs_master_data:
  seaweedfs_volume_data:

networks:
  vibec2:
    driver: bridge
