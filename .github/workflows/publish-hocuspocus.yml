name: Publish Hocuspocus Image

on:
  push:
    branches:
      - main
    paths:
      - "hocuspocus/**"
      - ".github/workflows/publish-hocuspocus.yml"
  pull_request:
    branches:
      - main
    paths:
      - "hocuspocus/**"
      - ".github/workflows/publish-hocuspocus.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: vibe-c2/vibe-c2-hocuspocus

jobs:
  test:
    name: Type-check and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hocuspocus

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: hocuspocus/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Run tests
        run: npm test

  build-and-push:
    name: Build and push hocuspocus image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=vibe-c2-hocuspocus
            org.opencontainers.image.description=VibeC2 hocuspocus collaboration sidecar (Yjs over WebSocket)
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=Proprietary

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./hocuspocus
          file: ./hocuspocus/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
