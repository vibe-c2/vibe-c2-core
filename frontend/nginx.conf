server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip is on by default in /etc/nginx/nginx.conf; enable a few extra MIME types here.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        font/woff
        font/woff2;

    # Cache hashed Vite asset bundles aggressively. Vite emits filenames with
    # content hashes, so they can never collide across deploys.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Top-level static files (favicon.svg, icons.svg, etc.) — short cache.
    location ~* \.(?:ico|svg|png|jpg|jpeg|gif|webp|woff2?)$ {
        access_log off;
        expires 1d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Never cache index.html — it pins the current bundle hash, so a stale
    # copy locks the user on an old build forever.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Lightweight liveness endpoint for orchestrators.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # SPA fallback — every unknown route serves index.html so React Router
    # can pick up the path on the client.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
