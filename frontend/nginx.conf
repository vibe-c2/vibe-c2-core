# Production frontend nginx.
#
# Serves the built Vite SPA and terminates TLS / HTTP/2 in front of the API
# backend. HTTP/2 multiplexes every request — including the long-lived
# graphql-ws WebSocket and any Hocuspocus collab WS — over a single TCP
# connection per origin, eliminating the HTTP/1.1 6-socket-per-origin cap
# that previously dictated subscription topology.
#
# Cert handling is delegated outward: in our production setup, certs are
# mounted into /etc/nginx/certs by the orchestrator (Kubernetes, Compose,
# cert-manager, or upstream LB). If TLS is terminated at the upstream LB
# instead, drop the `ssl` directives and `listen 80` is enough — but keep
# `http2 on;` (nginx will speak h2c to the LB).

# Plain HTTP listener. Redirect everything except healthz to HTTPS so old
# http:// links and any external monitors keep working.
server {
    listen 80 default_server;
    server_name _;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS + HTTP/2 — primary listener.
server {
    listen 443 ssl default_server;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/tls.crt;
    ssl_certificate_key /etc/nginx/certs/tls.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /usr/share/nginx/html;
    index index.html;

    # gzip is on by default in /etc/nginx/nginx.conf; enable a few extra MIME types here.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        font/woff
        font/woff2;

    # Cache hashed Vite asset bundles aggressively. Vite emits filenames with
    # content hashes, so they can never collide across deploys.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Top-level static files (favicon.svg, icons.svg, etc.) — short cache.
    location ~* \.(?:ico|svg|png|jpg|jpeg|gif|webp|woff2?)$ {
        access_log off;
        expires 1d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Never cache index.html — it pins the current bundle hash, so a stale
    # copy locks the user on an old build forever.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Lightweight liveness endpoint for orchestrators.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # SPA fallback — every unknown route serves index.html so React Router
    # can pick up the path on the client.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
