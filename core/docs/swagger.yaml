basePath: /api/v1
definitions:
  requests.EnrollRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  requests.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  requests.RefreshRequest:
    properties:
      refresh_token:
        type: string
      user_id:
        type: string
    required:
    - refresh_token
    - user_id
    type: object
  responses.AuthResponse:
    properties:
      auth_token:
        type: string
      permissions:
        items:
          type: string
        type: array
      refresh_token:
        type: string
      roles:
        items:
          type: string
        type: array
      username:
        type: string
    type: object
  responses.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  responses.StatusResponse:
    properties:
      enrolled:
        type: boolean
    type: object
  responses.SuccessResponse:
    properties:
      message:
        type: string
    type: object
info:
  contact: {}
  description: Command-and-control core backend API.
  title: VibeC2 Core API
  version: "1.0"
paths:
  /enroll:
    post:
      consumes:
      - application/json
      description: Create the initial admin account. Only works when no users exist
        (cold startup).
      parameters:
      - description: Admin credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/requests.EnrollRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/responses.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
      summary: Enroll first admin
      tags:
      - Enrollment
  /graphql:
    get:
      description: Serves the Altair GraphQL Client UI for interactive query testing.
        Development only.
      produces:
      - text/html
      responses: {}
      summary: GraphQL Playground (Altair)
      tags:
      - GraphQL
    post:
      consumes:
      - application/json
      description: Execute GraphQL queries and mutations. See the GraphQL schema for
        available operations. Use the Altair playground (GET /graphql) to explore
        the API interactively.
      produces:
      - application/json
      responses: {}
      security:
      - BearerAuth: []
      summary: GraphQL endpoint
      tags:
      - GraphQL
  /login:
    post:
      consumes:
      - application/json
      description: Authenticate with username and password to receive a token pair.
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/requests.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/responses.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
      summary: Login
      tags:
      - Auth
  /login/me:
    get:
      description: Return the authenticated user's info with a fresh token pair.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/responses.AuthResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Current user
      tags:
      - Auth
  /login/refresh:
    post:
      consumes:
      - application/json
      description: Rotate the refresh token and receive a new token pair.
      parameters:
      - description: Refresh token payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/requests.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/responses.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
      summary: Refresh tokens
      tags:
      - Auth
  /logout:
    post:
      description: Invalidate all refresh tokens for the current user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/responses.SuccessResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Logout
      tags:
      - Auth
  /status:
    get:
      description: Returns system state including whether initial enrollment has been
        completed.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/responses.StatusResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
      summary: System status
      tags:
      - Status
securityDefinitions:
  BearerAuth:
    description: Bearer JWT token (e.g. "Bearer eyJhb...")
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
