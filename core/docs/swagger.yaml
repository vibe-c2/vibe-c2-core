basePath: /api/v1
definitions:
  controller.WikiFileUploadResponse:
    properties:
      contentType:
        type: string
      filename:
        type: string
      id:
        type: string
      size:
        type: integer
      url:
        type: string
    type: object
  controller.WikiImageUploadResponse:
    properties:
      height:
        type: integer
      id:
        type: string
      url:
        type: string
      width:
        type: integer
    type: object
  controller.collabTicketRequest:
    properties:
      documentId:
        type: string
      schemaVersion:
        description: |-
          SchemaVersion is the editor schema version compiled into the requesting
          client. Absent (legacy/old clients that predate this field) decodes to 0.
          Compared against the document's ContentStateSchemaVersion to block clients
          too old to safely render — and thus edit — the stored content.
        type: integer
    required:
    - documentId
    type: object
  protocol.InboundMinionMessage:
    properties:
      encrypted_data:
        type: string
      id:
        type: string
      message_id:
        type: string
      meta:
        $ref: '#/definitions/protocol.MessageMeta'
      source:
        $ref: '#/definitions/protocol.SourceInfo'
      timestamp:
        type: string
      type:
        type: string
      version:
        type: string
    type: object
  protocol.MessageMeta:
    additionalProperties: {}
    type: object
  protocol.OutboundMinionMessage:
    properties:
      encrypted_data:
        type: string
      id:
        type: string
      message_id:
        type: string
      meta:
        $ref: '#/definitions/protocol.MessageMeta'
      timestamp:
        type: string
      type:
        type: string
      version:
        type: string
    type: object
  protocol.SourceInfo:
    properties:
      module:
        type: string
      module_instance:
        type: string
      tenant:
        type: string
      transport:
        type: string
    type: object
  requests.EnrollRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  requests.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  responses.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  responses.SessionResponse:
    properties:
      permissions:
        items:
          type: string
        type: array
      roles:
        items:
          type: string
        type: array
      user_id:
        type: string
      username:
        type: string
    type: object
  responses.StatusResponse:
    properties:
      enrolled:
        type: boolean
    type: object
  responses.SuccessResponse:
    properties:
      message:
        type: string
    type: object
  wikiimport.Report:
    properties:
      createdDocs:
        type: integer
      credentialsCreated:
        type: integer
      credentialsReused:
        type: integer
      credentialsSkipped:
        type: integer
      credentialsTombstoned:
        type: integer
      filesIngested:
        type: integer
      imagesIngested:
        type: integer
      importParentId:
        type: string
      skipped:
        items:
          $ref: '#/definitions/wikiimport.SkipRecord'
        type: array
      skippedDocs:
        type: integer
      timestampParentId:
        type: string
      totalDocs:
        type: integer
      warnings:
        items:
          $ref: '#/definitions/wikiimport.SkipRecord'
        type: array
    type: object
  wikiimport.SkipRecord:
    properties:
      path:
        type: string
      reason:
        type: string
    type: object
info:
  contact: {}
  description: Command-and-control core backend API.
  title: VibeC2 Core API
  version: "1.0"
paths:
  /channel/sync:
    post:
      consumes:
      - application/json
      description: Accepts an inbound.minion_message from a channel module and returns
        an outbound.minion_message. Payloads are opaque encrypted blobs; core currently
        returns a no-op outbound payload.
      parameters:
      - description: Inbound minion message
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/protocol.InboundMinionMessage'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/protocol.OutboundMinionMessage'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
      summary: Channel sync (data plane)
      tags:
      - Channels
  /enroll:
    post:
      consumes:
      - application/json
      description: Create the initial admin account. Only works when no users exist
        (cold startup).
      parameters:
      - description: Admin credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/requests.EnrollRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/responses.SessionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
      summary: Enroll first admin
      tags:
      - Enrollment
  /graphql:
    get:
      description: Serves the Altair GraphQL Client UI for interactive query testing.
        Development only.
      produces:
      - text/html
      responses: {}
      summary: GraphQL Playground (Altair)
      tags:
      - GraphQL
    post:
      consumes:
      - application/json
      description: Execute GraphQL queries and mutations. Authentication via httpOnly
        cookies; state-changing operations require an X-CSRF-Token header matching
        the csrf_token cookie.
      produces:
      - application/json
      responses: {}
      summary: GraphQL endpoint
      tags:
      - GraphQL
  /login:
    post:
      consumes:
      - application/json
      description: Authenticate with username and password. Tokens are set as httpOnly
        cookies; CSRF token in a non-httpOnly cookie.
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/requests.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/responses.SessionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
      summary: Login
      tags:
      - Auth
  /login/me:
    get:
      description: Return the authenticated user's info.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/responses.SessionResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
      summary: Current user
      tags:
      - Auth
  /login/refresh:
    post:
      description: Rotate the refresh token. Reads tokens from httpOnly cookies. Requires
        X-CSRF-Token header matching the csrf_token cookie.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/responses.SessionResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
      summary: Refresh tokens
      tags:
      - Auth
  /logout:
    post:
      description: Terminate the current session and clear auth cookies. Requires
        X-CSRF-Token header.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/responses.SuccessResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
      summary: Logout
      tags:
      - Auth
  /status:
    get:
      description: Returns system state including whether initial enrollment has been
        completed.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/responses.StatusResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
      summary: System status
      tags:
      - Status
  /wiki/collab-ticket:
    post:
      consumes:
      - application/json
      description: Issue a short-lived JWT for Hocuspocus WebSocket authentication
      parameters:
      - description: Document to collaborate on
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/controller.collabTicketRequest'
      produces:
      - application/json
      responses: {}
      security:
      - BearerAuth: []
      summary: Get collaboration ticket
      tags:
      - Wiki
  /wiki/export:
    get:
      description: Streams a zip archive of markdown documents plus referenced attachments.
        The format matches the import flow so the result can be re-imported via POST
        /api/v1/wiki/import/outline. Pass `rootId` to limit the export to one document
        + descendants; omit it to export the whole operation's wiki.
      parameters:
      - description: Target operation ID (UUID)
        in: query
        name: operationId
        required: true
        type: string
      - description: Subtree root document ID (UUID). Omit for tree-wide export.
        in: query
        name: rootId
        type: string
      produces:
      - application/zip
      responses:
        "200":
          description: OK
          schema:
            type: file
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Export a wiki tree or subtree as an Outline-flavored markdown zip
      tags:
      - Wiki
  /wiki/files:
    post:
      consumes:
      - multipart/form-data
      description: Upload a non-image file to be attached to a wiki document. The
        original filename is preserved for downloads; bytes are stored as-is.
      parameters:
      - description: Owning document ID (UUID)
        in: formData
        name: documentId
        required: true
        type: string
      - description: File bytes (max 50MB by default)
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/controller.WikiFileUploadResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
        "413":
          description: Request Entity Too Large
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
        "415":
          description: Unsupported Media Type
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Upload a wiki file attachment
      tags:
      - Wiki
  /wiki/files/{id}:
    get:
      description: Streams the file bytes. Caller must be a member of the file's operation.
        Pass ?preview=1 for inline rendering of safe formats (PDF, text).
      parameters:
      - description: File ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: If true, serve inline for safe MIME types
        in: query
        name: preview
        type: boolean
      produces:
      - application/octet-stream
      responses: {}
      security:
      - BearerAuth: []
      summary: Fetch a wiki file attachment
      tags:
      - Wiki
  /wiki/images:
    post:
      consumes:
      - multipart/form-data
      description: Upload an image to be embedded in a wiki document. Images are validated,
        sanitized (SVG) or re-encoded (raster, strips EXIF), and optionally downscaled.
      parameters:
      - description: Owning document ID (UUID)
        in: formData
        name: documentId
        required: true
        type: string
      - description: Image bytes (png/jpeg/webp/gif/avif/svg, max 10MB)
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/controller.WikiImageUploadResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
        "413":
          description: Request Entity Too Large
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
        "415":
          description: Unsupported Media Type
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Upload a wiki image
      tags:
      - Wiki
  /wiki/images/{id}:
    get:
      description: Streams the image bytes for an uploaded wiki image. Caller must
        be a member of the image's operation.
      parameters:
      - description: Image ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - image/*
      responses: {}
      security:
      - BearerAuth: []
      summary: Fetch a wiki image
      tags:
      - Wiki
  /wiki/import/outline:
    post:
      consumes:
      - multipart/form-data
      description: Imports an Outline (getoutline.com) markdown-format export zip
        into the target operation. All imported documents land under import/<ISO timestamp>/<collection>/.
        Requires operator+ role.
      parameters:
      - description: Target operation ID (UUID)
        in: query
        name: operationId
        required: true
        type: string
      - description: Outline markdown export zip
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/wikiimport.Report'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
        "413":
          description: Request Entity Too Large
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Import an Outline workspace export
      tags:
      - Wiki
securityDefinitions:
  BearerAuth:
    description: Bearer JWT token (e.g. "Bearer eyJhb...")
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
