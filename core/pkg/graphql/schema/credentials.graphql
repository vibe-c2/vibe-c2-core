# =============================================================================
# Findings — Credentials
# =============================================================================
#
# Credentials are an operation-scoped record of secrets that operators discover
# on target systems (passwords, SSH keys, API tokens, hashes). They live under
# the "Findings" page in the UI. The first tab of Findings is Credentials;
# additional tabs will follow the same shape.
#
# Note: the password / keys fields here are *target* secrets, not application
# secrets. They are stored as plain data and not redacted.

# --- Enums ---

enum CredentialType {
  PASSWORD
  SSH_KEY
  API_KEY
  TOKEN
  HASH
  OTHER
}

# --- Types ---

type CredentialComment {
  id: ID!
  # Null if the comment's author account was deleted. Mirrors Credential.createdBy.
  author: User
  text: String!
  createdAt: String!
  updatedAt: String!
}

# A named blob of key material attached to a credential (e.g. an SSH private
# key, a TLS cert). Operators give each key a label so a single credential
# can carry several keys without losing context.
type CredentialKey {
  name: String!
  content: String!
}

type Credential {
  id: ID!
  operationId: ID!
  # The full parent Operation. Resolved on demand via a DB lookup.
  #
  # Use this in cross-operation views (e.g. the global Findings page) where
  # you need to display which operation a credential belongs to. In scoped
  # views the operation is implicit, so keep using `operationId` and skip
  # this field — it costs a DB round trip per credential when selected.
  operation: Operation!
  name: String!
  type: CredentialType!
  username: String!
  password: String!
  keys: [CredentialKey!]!
  isValid: Boolean!
  tags: [String!]!
  comments: [CredentialComment!]!
  # Null for credentials whose creator was deleted.
  createdBy: User
  # Number of active wiki documents in this operation that reference this
  # credential via the /credential slash command. Cheap aggregation — the
  # credentials list pulls this for the table column without fanning out a
  # per-row lookup.
  backlinkCount: Int!
  # Active wiki documents in this operation that reference this credential
  # via the /credential slash command. Trashed referrers are excluded.
  # Capped at 200 most recently updated — past that, refining the source
  # documents is the expected fix, not pagination. Loaded on demand (e.g.
  # when the details dialog opens); not part of the table list payload.
  backlinks: [WikiDocument!]!
  createdAt: String!
  updatedAt: String!
}

type CredentialEdge {
  node: Credential!
  cursor: String!
}

type CredentialConnection {
  edges: [CredentialEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type CredentialEvent {
  action: EventAction!
  credentialId: ID!
  operationId: ID!
  credential: Credential
}

# --- Inputs ---

input CredentialKeyInput {
  name: String!
  content: String!
}

input CreateCredentialInput {
  name: String!
  type: CredentialType!
  username: String
  password: String
  keys: [CredentialKeyInput!]
  isValid: Boolean
  tags: [String!]
}

input UpdateCredentialInput {
  name: String
  type: CredentialType
  username: String
  password: String
  keys: [CredentialKeyInput!]
  isValid: Boolean
  tags: [String!]
}

# --- Queries ---

extend type Query {
  # Single credential by ID. Resolver checks operation membership.
  credential(id: ID!): Credential!
    @hasPermission(permission: "operation:member")

  # Cursor-paginated list of credentials scoped to an operation.
  # validOnly defaults to true (hides invalid). Pass false to show only invalid,
  # or null to show both.
  credentials(
    operationId: ID!
    search: String
    type: CredentialType
    tags: [String!]
    validOnly: Boolean = true
    first: Int = 20
    after: String
    last: Int
    before: String
  ): CredentialConnection!
    @hasPermission(permission: "operation:member")

  # Deduplicated tag set across all credentials in the operation.
  # Used to drive the tag filter / autocomplete UI.
  credentialTags(operationId: ID!): [String!]!
    @hasPermission(permission: "operation:member")

  # Cross-operation credentials list — powers the "global" Findings page.
  #
  # Note: this field intentionally has **no** @hasPermission directive. The
  # directive can only enforce a single operation_id, but this query spans
  # several operations. Authorization is performed by the resolver, which
  # verifies the caller's role in **every** operation referenced in the
  # result set:
  #   - operationIds = null  → resolver derives the caller's membership set
  #                            via the operation repository and queries those.
  #   - operationIds = []    → returns an empty connection without hitting DB.
  #   - operationIds = [...] → resolver authorizes each op (viewer minimum)
  #                            and returns 403 if any is not accessible.
  #
  # The list is capped server-side; passing more than the cap (currently 100)
  # returns an error. Use the standard filters (search/type/tags/validOnly) on
  # top — they apply across the union.
  myCredentials(
    operationIds: [ID!]
    search: String
    type: CredentialType
    tags: [String!]
    validOnly: Boolean = true
    first: Int = 20
    after: String
    last: Int
    before: String
  ): CredentialConnection!

  # Deduplicated tag set across credentials in the given operations.
  # Same authorization model as myCredentials.
  myCredentialTags(operationIds: [ID!]): [String!]!
}

# --- Mutations ---

extend type Mutation {
  # createCredential creates a new credential in an operation.
  # Requires at least operator role in the operation.
  createCredential(operationId: ID!, input: CreateCredentialInput!): Credential!
    @hasPermission(permission: "operation:member")

  # updateCredential modifies an existing credential.
  # Requires at least operator role in the operation.
  updateCredential(id: ID!, input: UpdateCredentialInput!): Credential!
    @hasPermission(permission: "operation:member")

  # deleteCredential removes a credential by ID.
  # Requires at least operator role in the operation.
  deleteCredential(id: ID!): Boolean!
    @hasPermission(permission: "operation:member")

  # addCredentialComment appends a comment to a credential.
  # Requires at least operator role in the operation.
  addCredentialComment(credentialId: ID!, text: String!): Credential!
    @hasPermission(permission: "operation:member")

  # updateCredentialComment edits an existing comment.
  # Author can edit own comments; operation admins can edit any comment.
  updateCredentialComment(credentialId: ID!, commentId: ID!, text: String!): Credential!
    @hasPermission(permission: "operation:member")

  # deleteCredentialComment removes a comment from a credential.
  # Author can delete own comments; operation admins can delete any comment.
  deleteCredentialComment(credentialId: ID!, commentId: ID!): Credential!
    @hasPermission(permission: "operation:member")
}

# --- Subscriptions ---

extend type Subscription {
  # Real-time credential changes scoped to an operation.
  credentialChanged(operationId: ID!): CredentialEvent!
    @hasPermission(permission: "operation:member")

  # Real-time credential changes across multiple operations. Sibling of
  # myCredentials — powers the global Findings page.
  #
  # Like myCredentials, this field has **no** @hasPermission directive. The
  # directive can only enforce a single operation_id, but this subscription
  # spans several operations. Authorization is performed by the resolver at
  # subscribe time, with the same semantics:
  #
  #   - operationIds = null  → resolver derives the caller's membership set
  #                            via the operation repository and filters
  #                            incoming events to that set.
  #   - operationIds = []    → connect succeeds and never emits.
  #   - operationIds = [...] → resolver authorizes each op (viewer minimum)
  #                            and returns 403 if any is not accessible. Only
  #                            events whose operation_id is in the set are
  #                            delivered.
  #
  # The membership set is captured at subscribe time. If the caller joins or
  # leaves an operation while a "nil" subscription is live, they need to
  # reconnect to pick up the new membership set — same constraint as
  # operationChanged.
  myCredentialChanged(operationIds: [ID!]): CredentialEvent!
}
