# =============================================================================
# GraphQL Schema for Vibe C2 Core
# =============================================================================
#
# This file defines the entire GraphQL API using SDL (Schema Definition Language).
# Think of it as a contract between the backend and frontend — it describes:
#   - What data types exist (User, UserConnection)
#   - What queries you can run (read data)
#   - What mutations you can run (write/modify data)
#   - What inputs are needed for mutations
#
# gqlgen reads this file and generates Go code (resolver interfaces, types)
# that you then implement. If the schema and your resolvers don't match,
# the build will fail — this is a feature, not a bug!
# =============================================================================

# -----------------------------------------------------------------------------
# Directive: @hasPermission
# -----------------------------------------------------------------------------
# Directives are annotations you attach to schema fields to add behavior.
# This custom directive runs BEFORE the resolver function, checking if the
# authenticated user has the required RBAC permission. If they don't,
# a "forbidden" error is returned without ever calling the resolver.
#
# Example: @hasPermission(permission: "user:read") means "only users whose
# roles grant 'user:read' can call this query."
# -----------------------------------------------------------------------------
directive @hasPermission(permission: String!) on FIELD_DEFINITION

# -----------------------------------------------------------------------------
# Enums
# -----------------------------------------------------------------------------

# OperationRole represents a user's role within an operation.
# Roles form a hierarchy: ADMIN > OPERATOR > VIEWER.
#   - ADMIN: can manage operation users/roles and edit operation metadata
#   - OPERATOR: can manage entities within the operation (future)
#   - VIEWER: read-only access to the operation
enum OperationRole {
  ADMIN
  OPERATOR
  VIEWER
}

# -----------------------------------------------------------------------------
# Types
# -----------------------------------------------------------------------------
# A GraphQL type defines the shape of data that can be returned.
# Fields with "!" are non-nullable (guaranteed to have a value).
# [String!]! means a non-null array of non-null strings.

# User represents an operator account in the C2 system.
type User {
  id: ID!                  # Unique identifier (UUID as string)
  username: String!        # Login name (unique)
  roles: [String!]!        # RBAC roles, e.g. ["admin"] or ["user"]
  active: Boolean!         # Whether this account is enabled
  createdAt: String!       # ISO 8601 timestamp
  updatedAt: String!       # ISO 8601 timestamp
}

# Minimal user info for autocomplete pickers (e.g., adding operation members).
# Intentionally lightweight — no roles, status, or timestamps.
type UserSuggestion {
  id: ID!
  username: String!
}

# -----------------------------------------------------------------------------
# Relay Connection Types
# -----------------------------------------------------------------------------
# The Relay Connection spec is the standard GraphQL pagination pattern.
# Instead of offset/limit, it uses opaque cursors that point to specific items.
#
# Connection: wraps the result list with edges + pageInfo + totalCount
# Edge:       wraps each item with the item itself (node) and its cursor
# PageInfo:   tells the client whether more pages exist and provides cursors
#             for the first and last items in the current page
#
# To paginate forward:  use first/after  (e.g. first: 20, after: "<endCursor>")
# To paginate backward: use last/before  (e.g. last: 20, before: "<startCursor>")

# PageInfo is shared across all connection types.
type PageInfo {
  hasNextPage: Boolean!      # True if more items exist after the last edge
  hasPreviousPage: Boolean!  # True if more items exist before the first edge
  startCursor: String        # Cursor of the first edge (null if empty)
  endCursor: String          # Cursor of the last edge (null if empty)
}

type UserEdge {
  node: User!                # The actual user object
  cursor: String!            # Opaque cursor for this user's position
}

type UserConnection {
  edges: [UserEdge!]!        # The page of users, each wrapped with a cursor
  pageInfo: PageInfo!        # Pagination metadata
  totalCount: Int!           # Total users matching the query (for UI counters)
}

# OperationMember represents a user's membership in an operation with their role.
type OperationMember {
  user: User!              # The member user
  role: OperationRole!     # Their role in this operation
}

# Operation represents an operational context in the C2 system.
# Operations group users (and later implants, agents, etc.) together.
# The relationship between users and operations is many-to-many:
# a user can belong to multiple operations, and an operation has multiple members.
# Each member has a role (admin, operator, viewer) that controls their access.
type Operation {
  id: ID!                  # Unique identifier (UUID as string)
  name: String!            # Operation name (unique)
  description: String!     # What this operation is about
  members: [OperationMember!]! # Users assigned to this operation with their roles
  createdAt: String!       # ISO 8601 timestamp
  updatedAt: String!       # ISO 8601 timestamp
}

type OperationEdge {
  node: Operation!
  cursor: String!
}

type OperationConnection {
  edges: [OperationEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

# =============================================================================
# Scheme Engine — Network Points & Ports
# =============================================================================
# SchemeNetworkPoint is the first building block of the scheme engine.
# It represents any network device (server, VM, or any IP-addressable entity)
# in an operation's scheme. Ports are embedded sub-documents.

# SchemeNetworkPort represents a network port on a SchemeNetworkPoint.
# Embedded within SchemeNetworkPoint (not queried independently).
type SchemeNetworkPort {
  id: ID!                  # Unique identifier (UUID)
  number: Int!             # Port number (1-65535)
  protocol: String!        # "tcp", "udp", etc.
  service: String!         # Detected service name (e.g. "ssh", "http")
  notes: String!           # Free-form operator notes
}

# SchemeNetworkPoint represents a network device in an operation's scheme.
# A device with one or more network identifiers (IP, hostname, domain).
type SchemeNetworkPoint {
  id: ID!                          # Unique identifier (UUID)
  operationId: ID!                 # The operation this point belongs to
  names: [String!]!                # Network identifiers (ipv4, ipv6, hostname, domain)
  description: String!             # What this network point is
  tags: [String!]!                 # User-defined labels for filtering
  ports: [SchemeNetworkPort!]!     # Network ports on this device
  createdAt: String!               # ISO 8601 timestamp
  updatedAt: String!               # ISO 8601 timestamp
}

type SchemeNetworkPointEdge {
  node: SchemeNetworkPoint!
  cursor: String!
}

type SchemeNetworkPointConnection {
  edges: [SchemeNetworkPointEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

# -----------------------------------------------------------------------------
# Queries (read operations)
# -----------------------------------------------------------------------------
# In GraphQL, all read operations live under the Query type.
# Each field is a "query" that the client can call.
#
# Example client query:
#   query {
#     users(search: "admin", first: 10) {
#       edges { node { id username roles } cursor }
#       pageInfo { hasNextPage endCursor }
#       totalCount
#     }
#   }

type Query {
  # me returns the currently authenticated user.
  # Requires basic auth (any logged-in user).
  me: User! @hasPermission(permission: "*")

  # user returns a single user by their ID.
  # Requires user:read permission (admin only by default).
  user(id: ID!): User! @hasPermission(permission: "user:read")

  # users returns a paginated, searchable list of all users.
  # Uses cursor-based pagination (Relay Connection spec):
  # - first/after:  forward pagination (get N items after cursor)
  # - last/before:  backward pagination (get N items before cursor)
  # - search: optional text filter (matches username and roles)
  users(
    search: String
    first: Int = 20
    after: String
    last: Int
    before: String
  ): UserConnection! @hasPermission(permission: "user:read")

  # userSuggestions returns a lightweight list of users matching a search string.
  # Designed for autocomplete pickers (e.g., adding operation members).
  # Returns only id and username — no sensitive data like roles or status.
  # Requires operation:member permission (available to all authenticated users).
  userSuggestions(search: String!, first: Int = 10): [UserSuggestion!]!
    @hasPermission(permission: "operation:member")

  # operation returns a single operation by its ID.
  operation(id: ID!): Operation! @hasPermission(permission: "operation:read")

  # operations returns a paginated, searchable list of all operations.
  operations(
    search: String
    first: Int = 20
    after: String
    last: Int
    before: String
  ): OperationConnection! @hasPermission(permission: "operation:read")

  # myOperationRole returns the caller's role in a specific operation,
  # or null if the caller is not a member of that operation.
  # Useful for the frontend to know which UI controls to show.
  myOperationRole(operationId: ID!): OperationRole
    @hasPermission(permission: "operation:member")

  # schemeNetworkPoint returns a single network point by its ID.
  # App-level gate; resolver checks caller's operation membership.
  schemeNetworkPoint(id: ID!): SchemeNetworkPoint!
    @hasPermission(permission: "operation:member")

  # schemeNetworkPoints returns a paginated list of network points for an operation.
  schemeNetworkPoints(
    operationId: ID!
    search: String
    first: Int = 20
    after: String
    last: Int
    before: String
  ): SchemeNetworkPointConnection!
    @hasPermission(permission: "operation:member")
}

# -----------------------------------------------------------------------------
# Inputs (data sent by the client for mutations)
# -----------------------------------------------------------------------------
# Input types are like "request bodies" in REST. They define what fields
# the client must/can send when creating or updating data.

# CreateUserInput — all fields required to create a new user.
input CreateUserInput {
  username: String!         # Must be unique
  password: String!         # Will be bcrypt-hashed before storage
  roles: [String!]!         # e.g. ["admin"] or ["user"]
  active: Boolean = true    # Defaults to true if omitted
}

# UpdateUserInput — all fields optional (only send what you want to change).
# This is a "partial update" pattern — if a field is null/omitted, it is
# left unchanged on the server.
input UpdateUserInput {
  username: String
  password: String          # If provided, will be re-hashed
  roles: [String]
  active: Boolean
}

# CreateOperationInput — fields needed to create a new operation.
input CreateOperationInput {
  name: String!             # Must be unique
  description: String       # Optional, defaults to empty string
}

# UpdateOperationInput — partial update for an operation.
input UpdateOperationInput {
  name: String
  description: String
}

# CreateSchemeNetworkPointInput — fields needed to create a network point.
# names is required (at least one network identifier).
input CreateSchemeNetworkPointInput {
  names: [String!]!               # At least one required (validated in resolver)
  description: String
  tags: [String!]
}

# UpdateSchemeNetworkPointInput — partial update for a network point.
input UpdateSchemeNetworkPointInput {
  names: [String!]                # If provided, replaces entire array
  description: String
  tags: [String!]
}

# CreateSchemeNetworkPortInput — fields needed to add a port.
input CreateSchemeNetworkPortInput {
  number: Int!                    # Required: port number
  protocol: String
  service: String
  notes: String
}

# UpdateSchemeNetworkPortInput — partial update for a port.
input UpdateSchemeNetworkPortInput {
  number: Int
  protocol: String
  service: String
  notes: String
}

# -----------------------------------------------------------------------------
# Mutations (write operations)
# -----------------------------------------------------------------------------
# Mutations change data. Each returns the affected object so the client
# can update its UI without a separate query.
#
# Example client mutation:
#   mutation {
#     createUser(input: { username: "bob", password: "s3cret", roles: ["user"] }) {
#       id username roles active
#     }
#   }

type Mutation {
  # createUser registers a new user account.
  # Requires user:create permission (admin only).
  createUser(input: CreateUserInput!): User!
    @hasPermission(permission: "user:create")

  # updateUser modifies an existing user by ID.
  # Requires user:update permission (admin only).
  updateUser(id: ID!, input: UpdateUserInput!): User!
    @hasPermission(permission: "user:update")

  # deleteUser removes a user account by ID.
  # Requires user:delete permission (admin only).
  deleteUser(id: ID!): Boolean!
    @hasPermission(permission: "user:delete")

  # updateOwnProfile lets a user modify their own account.
  # Requires user:update:own permission (any authenticated user).
  # The server determines which user to update from the JWT token.
  updateOwnProfile(input: UpdateUserInput!): User!
    @hasPermission(permission: "user:update:own")

  # createOperation registers a new operation.
  # Requires operation:create permission (admin only).
  # The creator is automatically added as an operation admin.
  createOperation(input: CreateOperationInput!): Operation!
    @hasPermission(permission: "operation:create")

  # updateOperation modifies an existing operation by ID.
  # App-level gate; resolver checks that caller is an operation admin.
  updateOperation(id: ID!, input: UpdateOperationInput!): Operation!
    @hasPermission(permission: "operation:member")

  # deleteOperation removes an operation by ID.
  # Requires operation:delete permission (app admin only).
  deleteOperation(id: ID!): Boolean!
    @hasPermission(permission: "operation:delete")

  # addOperationMember assigns a user to an operation with the given role.
  # App-level gate; resolver checks that caller is an operation admin.
  addOperationMember(operationId: ID!, userId: ID!, role: OperationRole!): Operation!
    @hasPermission(permission: "operation:member")

  # removeOperationMember removes a user from an operation.
  # App-level gate; resolver checks that caller is an operation admin.
  removeOperationMember(operationId: ID!, userId: ID!): Operation!
    @hasPermission(permission: "operation:member")

  # updateOperationMemberRole changes a member's role in an operation.
  # App-level gate; resolver checks that caller is an operation admin.
  updateOperationMemberRole(operationId: ID!, userId: ID!, role: OperationRole!): Operation!
    @hasPermission(permission: "operation:member")

  # --- Scheme Network Point mutations ---

  # createSchemeNetworkPoint creates a new network point in an operation.
  # Requires at least operator role in the operation.
  createSchemeNetworkPoint(operationId: ID!, input: CreateSchemeNetworkPointInput!): SchemeNetworkPoint!
    @hasPermission(permission: "operation:member")

  # updateSchemeNetworkPoint modifies an existing network point.
  # Requires at least operator role in the operation.
  updateSchemeNetworkPoint(id: ID!, input: UpdateSchemeNetworkPointInput!): SchemeNetworkPoint!
    @hasPermission(permission: "operation:member")

  # deleteSchemeNetworkPoint removes a network point by ID.
  # Requires at least operator role in the operation.
  deleteSchemeNetworkPoint(id: ID!): Boolean!
    @hasPermission(permission: "operation:member")

  # addSchemeNetworkPort adds a port to a network point.
  # Requires at least operator role in the operation.
  addSchemeNetworkPort(pointId: ID!, input: CreateSchemeNetworkPortInput!): SchemeNetworkPoint!
    @hasPermission(permission: "operation:member")

  # updateSchemeNetworkPort updates a port on a network point.
  # Requires at least operator role in the operation.
  updateSchemeNetworkPort(pointId: ID!, portId: ID!, input: UpdateSchemeNetworkPortInput!): SchemeNetworkPoint!
    @hasPermission(permission: "operation:member")

  # removeSchemeNetworkPort removes a port from a network point.
  # Requires at least operator role in the operation.
  removeSchemeNetworkPort(pointId: ID!, portId: ID!): SchemeNetworkPoint!
    @hasPermission(permission: "operation:member")
}
