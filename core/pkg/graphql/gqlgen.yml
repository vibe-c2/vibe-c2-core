# =============================================================================
# gqlgen Configuration
# =============================================================================
#
# This file tells gqlgen how to generate Go code from the GraphQL schema.
# When you run `go generate`, gqlgen reads this config to know:
#   - Where the .graphql schema files are
#   - Where to output the generated Go code
#   - How to map GraphQL types to existing Go structs
#
# After changing the schema, run:  go generate ./pkg/graphql/...
# =============================================================================

# Where to find the GraphQL SDL schema files.
# You can split your schema across multiple files if it gets large.
schema:
  - schema/*.graphql

# The generated "executable schema" — this is the core runtime that gqlgen
# produces. You never edit this file; it's regenerated every time.
exec:
  filename: generated/generated.go
  package: generated

# Where gqlgen puts generated Go types for GraphQL inputs and types
# that aren't mapped to existing structs. For example, CreateUserInput
# will be generated here because we don't have a Go struct for it yet.
model:
  filename: model/models_gen.go
  package: model

# The resolver skeleton. gqlgen generates a resolver interface and
# (on first run) stub implementations that you fill in with real logic.
resolver:
  layout: follow-schema          # One resolver file per schema file
  dir: resolver                  # Directory for resolver files
  package: resolver
  filename_template: "{name}.resolvers.go"

# Model mappings — this is the key part!
# Here we tell gqlgen: "Don't generate a new User struct. Instead, use
# our existing models.User from the codebase." This avoids duplication
# and lets resolvers work directly with our domain model.
models:
  # Map PageInfo to our shared pagination package struct so gqlgen
  # uses it directly instead of generating a new type.
  PageInfo:
    model:
      - github.com/vibe-c2/vibe-c2-core/core/pkg/pagination.PageInfo

  # Map GraphQL ID scalar to Go string (default is usually fine, but
  # being explicit helps avoid confusion).
  ID:
    model:
      - github.com/99designs/gqlgen/graphql.ID

  # Map the GraphQL "User" type to our existing User model.
  # Because some fields don't match exactly (e.g., UserID vs id,
  # DefaultField timestamps vs createdAt/updatedAt), we'll use
  # custom field resolvers to bridge the gap.
  User:
    model:
      - github.com/vibe-c2/vibe-c2-core/core/pkg/models.User
    fields:
      # These fields need custom resolvers because the Go struct field
      # names/types don't match the GraphQL field names directly.
      id:
        resolver: true         # UserID (uuid.UUID) -> ID (string)
      createdAt:
        resolver: true         # field.DefaultField.CreateAt -> string
      updatedAt:
        resolver: true         # field.DefaultField.UpdateAt -> string

  # Map the GraphQL "OperationRole" enum to our existing OperationRole type.
  # The Go type implements MarshalGQL/UnmarshalGQL for case conversion.
  OperationRole:
    model:
      - github.com/vibe-c2/vibe-c2-core/core/pkg/models.OperationRole

  # Map the GraphQL "OperationMember" type to our existing OperationMember model.
  # The "user" field needs a resolver because the Go struct stores a UserID (UUID)
  # but GraphQL expects a full User object (requires a DB lookup).
  OperationMember:
    model:
      - github.com/vibe-c2/vibe-c2-core/core/pkg/models.OperationMember
    fields:
      user:
        resolver: true         # UserID (uuid.UUID) -> User (fetched from DB)

  # Map the GraphQL "Operation" type to our existing Operation model.
  # Same pattern as User — fields that don't map directly get custom resolvers.
  Operation:
    model:
      - github.com/vibe-c2/vibe-c2-core/core/pkg/models.Operation
    fields:
      id:
        resolver: true         # OperationID (uuid.UUID) -> ID (string)
      members:
        resolver: true         # []OperationMember -> [OperationMember!]! (resolve User for each)
      createdAt:
        resolver: true         # field.DefaultField.CreateAt -> string
      updatedAt:
        resolver: true         # field.DefaultField.UpdateAt -> string

  # Map the GraphQL "SchemeNetworkPoint" type to our existing model.
  # Field resolvers bridge UUID->string and timestamp->RFC3339 conversions.
  SchemeNetworkPoint:
    model:
      - github.com/vibe-c2/vibe-c2-core/core/pkg/models.SchemeNetworkPoint
    fields:
      id:
        resolver: true         # PointID (uuid.UUID) -> ID (string)
      operationId:
        resolver: true         # OperationID (uuid.UUID) -> ID (string)
      ports:
        resolver: true         # []SchemeNetworkPort -> []*SchemeNetworkPort (pointer slice)
      createdAt:
        resolver: true         # field.DefaultField.CreateAt -> string
      updatedAt:
        resolver: true         # field.DefaultField.UpdateAt -> string

  # Map the GraphQL "SchemeNetworkPort" type to our existing model.
  SchemeNetworkPort:
    model:
      - github.com/vibe-c2/vibe-c2-core/core/pkg/models.SchemeNetworkPort
    fields:
      id:
        resolver: true         # PortID (uuid.UUID) -> ID (string)

  # Map the GraphQL "Session" type to our existing Session model.
  # `status` and `lastActivityAt` are decorated from Redis at query time;
  # `isCurrent` is computed from the request context. Everything else is
  # a field on the underlying Mongo row.
  Session:
    model:
      - github.com/vibe-c2/vibe-c2-core/core/pkg/models.Session
    fields:
      id:
        resolver: true         # SessionID (uuid.UUID) -> ID (string)
      userId:
        resolver: true         # UserID (uuid.UUID) -> ID (string)
      user:
        resolver: true         # UserID (uuid.UUID) -> User (fetched from DB)
      status:
        resolver: true         # Decorated from Redis presence
      lastActivityAt:
        resolver: true         # Decorated from Redis value, nullable
      isCurrent:
        resolver: true         # Computed field — not stored in model
      createdAt:
        resolver: true         # field.DefaultField.CreateAt -> string
      updatedAt:
        resolver: true         # field.DefaultField.UpdateAt -> string

  # SessionStatus is a derived enum (ACTIVE/INACTIVE), still mapped to a
  # Go type for marshalling to GraphQL.
  SessionStatus:
    model:
      - github.com/vibe-c2/vibe-c2-core/core/pkg/models.SessionStatus

  # Map the GraphQL "WikiDocument" type to our existing WikiDocument model.
  # Field resolvers bridge UUID->string, timestamp->RFC3339, and relation lookups.
  WikiDocument:
    model:
      - github.com/vibe-c2/vibe-c2-core/core/pkg/models.WikiDocument
    fields:
      id:
        resolver: true
      operationId:
        resolver: true
      parentDocument:
        resolver: true
      childDocuments:
        resolver: true
      childCount:
        resolver: true
      createdBy:
        resolver: true
      deletedBy:
        resolver: true
      lastBackupAt:
        resolver: true
      deletedAt:
        resolver: true
      createdAt:
        resolver: true
      updatedAt:
        resolver: true

  # Map the GraphQL "WikiDocumentBackup" type to our existing model.
  WikiDocumentBackup:
    model:
      - github.com/vibe-c2/vibe-c2-core/core/pkg/models.WikiDocumentBackup
    fields:
      id:
        resolver: true
      documentId:
        resolver: true
      contentLength:
        resolver: true
      createdBy:
        resolver: true
      createdAt:
        resolver: true

  # Map the backup trigger enum to our existing Go type.
  WikiDocumentBackupTrigger:
    model:
      - github.com/vibe-c2/vibe-c2-core/core/pkg/models.WikiDocumentBackupTrigger

  # Map the GraphQL "WikiDocumentVisit" type to our existing model. The
  # `document` field is a relation lookup — we store DocumentID and resolve
  # the live WikiDocument at query time so renamed/moved docs render with
  # current metadata.
  WikiDocumentVisit:
    model:
      - github.com/vibe-c2/vibe-c2-core/core/pkg/models.WikiDocumentVisit
    fields:
      id:
        resolver: true   # ObjectID -> ID (string)
      document:
        resolver: true   # DocumentID (uuid.UUID) -> WikiDocument (fetched from DB)
      visitedAt:
        resolver: true   # time.Time -> RFC3339 string
